[tasks]
gate = "pre-commit run --all-files"
test = "pytest -n auto"
ddl-apply = "python -m tools.apply_ddl"
smoke = "python -m tools.smoke_test"
verify-merge = "python -m tools.verify_merge"
fixtures-build = "python -m fixtures.build"
fixtures-validate = "python -m fixtures.validate"
fixtures-load = "python -m fixtures.load"

# The allowlist enumerates observed spellings of permissive licenses only;
# GPL/AGPL/SSPL or non-commercial terms must fail the second step.
[tasks.licenses]
sequence = [
  { cmd = "pip-licenses --ignore-packages dealflow --format=markdown --with-urls --order=license --output-file=THIRD_PARTY_LICENSES.md" },
  { cmd = "pip-licenses --ignore-packages dealflow '--allow-only=MIT;MIT License;MIT-0;BSD License;3-Clause BSD License;BSD-2-Clause;BSD-3-Clause;BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0;Apache Software License;Apache License 2.0;Apache-2.0;Apache-2.0 OR BSD-2-Clause;Apache-2.0 OR BSD-3-Clause;Apache Software License; BSD License;ISC License (ISCL);ISC;Mozilla Public License 2.0 (MPL 2.0);Python Software Foundation License;The Unlicense (Unlicense);CMU License (MIT-CMU)'" },
]
