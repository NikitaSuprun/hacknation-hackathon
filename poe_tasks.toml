[tasks]
gate = "uv run pre-commit run --all-files"
test = "uv run pytest -n auto"
ddl-apply = "uv run python -m tools.apply_ddl"
smoke = "uv run python -m tools.smoke_test"
verify-merge = "uv run python -m tools.verify_merge"
fixtures-build = "uv run python -m fixtures.build"
fixtures-validate = "uv run python -m fixtures.validate"
fixtures-load = "uv run python -m fixtures.load"
scrape-github = "uv run python -m scrapers.github"
scrape-papers = "uv run python -m scrapers.papers"
er = "uv run python -m er"
scoring = "uv run python -m scoring"

# The allowlist enumerates observed spellings of permissive licenses only;
# GPL/AGPL/SSPL or non-commercial terms must fail the check.
licenses-check = "uv run pip-licenses --ignore-packages dealflow '--allow-only=MIT;MIT License;MIT-0;MIT OR Apache-2.0;BSD License;3-Clause BSD License;BSD-2-Clause;BSD-3-Clause;BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0;Apache Software License;Apache License 2.0;Apache-2.0;Apache-2.0 OR BSD-2-Clause;Apache-2.0 OR BSD-3-Clause;Apache Software License; BSD License;ISC License (ISCL);ISC;Mozilla Public License 2.0 (MPL 2.0);Python Software Foundation License;PSF-2.0;The Unlicense (Unlicense);CMU License (MIT-CMU)'"

[tasks.licenses]
sequence = [
  { cmd = "uv run pip-licenses --ignore-packages dealflow --format=markdown --with-urls --order=license --output-file=THIRD_PARTY_LICENSES.md" },
  { ref = "licenses-check" },
]
