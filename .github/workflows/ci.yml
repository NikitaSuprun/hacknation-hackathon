name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pre-commit run --all-files --show-diff-on-failure
      - run: uv run pytest -n auto
