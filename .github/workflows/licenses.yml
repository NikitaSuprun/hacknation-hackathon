name: licenses

on:
  pull_request:
    paths: [pyproject.toml, uv.lock]
  push:
    branches: [main]
    paths: [pyproject.toml, uv.lock]

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run poe licenses
      - run: git diff --exit-code THIRD_PARTY_LICENSES.md
