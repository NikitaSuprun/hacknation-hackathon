<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <style>
    .bg      { fill: #0B0E14; }
    .box     { fill: #171E2B; stroke: #2E3B52; stroke-width: 1.5; }
    .cyl     { fill: #16202F; stroke: #35486A; stroke-width: 1.5; }
    .cyltop  { fill: #1D2A3D; stroke: #35486A; stroke-width: 1.5; }
    .chip    { fill: #151C28; stroke: #273246; stroke-width: 1.2; }
    .chipdim { fill: #101620; stroke: #222B3B; stroke-width: 1.2; stroke-dasharray: 4 4; }
    .cont    { fill: none; stroke-width: 1.4; stroke-dasharray: 7 6; }
    .note    { fill: #1A1710; stroke: #5C4A26; stroke-width: 1.2; }
    .t       { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #E8ECF2; }
    .title   { font-size: 31px; font-weight: 600; letter-spacing: -0.3px; }
    .tag     { font-size: 14.5px; fill: #E5B769; }
    .hdr     { font-size: 11.5px; font-weight: 600; letter-spacing: 1.7px; fill: #6F7C91; }
    .nt      { font-size: 17px; font-weight: 600; }
    .nl      { font-size: 11.5px; fill: #8B97AB; }
    .chipt   { font-size: 13.5px; font-weight: 600; }
    .chipl   { font-size: 10px; fill: #7D8A9E; }
    .pill    { font-size: 9.5px; fill: #6F7C91; letter-spacing: 0.3px; }
    .alab    { font-size: 10px; fill: #6F7C91; }
    .notet   { font-size: 11px; fill: #E5B769; }
    .dimt    { fill: #5D6879; }
    .foot    { font-size: 10px; fill: #4E5768; }
    .flow    { stroke: #5A6B87; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .loop    { stroke: #7A6438; stroke-width: 1.8; fill: none; stroke-linecap: round;
               stroke-linejoin: round; stroke-dasharray: 6 5; }
  </style>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6B87"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7A6438"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect x="0" y="0" width="1600" height="3" fill="#E5B769"/>

  <!-- title -->
  <text class="t title" x="56" y="66">Maschmeyer&#8217;s Chosen Portfolio</text>
  <text class="t tag" x="56" y="92">You don&#8217;t apply. You get chosen.</text>
  <text class="t nl" x="1544" y="62" text-anchor="end">Early-signal deal sourcing &#8212; public builder signals in, ranked ventures out</text>
  <text class="t foot" x="1544" y="88" text-anchor="end">One warehouse &#183; one person_id &#183; every score traceable to a source</text>

  <!-- ================= SOURCES ================= -->
  <text class="t hdr" x="56" y="134">SOURCES</text>

  <rect class="chip" x="56" y="148" width="220" height="54" rx="8"/>
  <text class="t chipt" x="76" y="172">GitHub</text>
  <text class="t chipl" x="76" y="189">repos &#183; contributors &#183; commits</text>

  <rect class="chip" x="56" y="208" width="220" height="54" rx="8"/>
  <text class="t chipt" x="76" y="232">arXiv &#43; OpenAlex</text>
  <text class="t chipl" x="76" y="249">papers &#183; citations &#183; affiliations</text>

  <rect class="chip" x="56" y="268" width="220" height="54" rx="8"/>
  <rect x="56" y="268" width="3" height="54" fill="#E5B769"/>
  <text class="t chipt" x="76" y="292">Hack Nation</text>
  <text class="t chipl" x="76" y="309">teams &#183; pitches &#183; CVs</text>

  <rect class="chipdim" x="56" y="328" width="220" height="54" rx="8"/>
  <text class="t chipt dimt" x="76" y="352">Zefix / SHAB</text>
  <text class="t chipl dimt" x="76" y="369">Swiss registry</text>
  <rect x="222" y="338" width="38" height="16" rx="8" fill="none" stroke="#4E5768"/>
  <text class="t pill" x="241" y="350" text-anchor="middle">next</text>

  <text class="t alab" x="56" y="404">our own connectors &#8212; retry, validate, idempotent writes</text>

  <!-- manifold: all four sources collect into one feed -->
  <path class="flow" d="M276 175 H296 M276 235 H296 M276 295 H296 M276 355 H296 M296 175 V355"/>
  <path class="flow" d="M296 265 H344" marker-end="url(#ah)"/>

  <!-- ================= DATABRICKS CONTAINER ================= -->
  <rect class="cont" x="320" y="150" width="910" height="480" rx="14" stroke="#7A3228"/>
  <rect x="336" y="140" width="132" height="20" fill="#0B0E14"/>
  <text class="t hdr" x="344" y="155" fill="#E8543C">DATABRICKS</text>

  <!-- Bronze cylinder -->
  <path class="cyl" d="M350,216 a125,16 0 0 1 250,0 v98 a125,16 0 0 1 -250,0 z"/>
  <ellipse class="cyltop" cx="475" cy="216" rx="125" ry="16"/>
  <text class="t nt" x="475" y="268" text-anchor="middle">Bronze</text>
  <text class="t nl" x="475" y="291" text-anchor="middle">raw payloads, kept whole</text>

  <path class="flow" d="M606 265 H634" marker-end="url(#ah)"/>

  <!-- Entity resolution -->
  <rect class="box" x="640" y="200" width="250" height="130" rx="12"/>
  <text class="t nt" x="765" y="252" text-anchor="middle">Entity resolution</text>
  <text class="t nl" x="765" y="275" text-anchor="middle">one person_id per human</text>
  <rect x="682" y="292" width="166" height="20" rx="10" fill="none" stroke="#31405A"/>
  <text class="t pill" x="765" y="305" text-anchor="middle">rules &#183; Splink &#183; Claude</text>

  <path class="flow" d="M896 265 H924" marker-end="url(#ah)"/>

  <!-- Silver cylinder -->
  <path class="cyl" d="M930,216 a125,16 0 0 1 250,0 v98 a125,16 0 0 1 -250,0 z"/>
  <ellipse class="cyltop" cx="1055" cy="216" rx="125" ry="16"/>
  <text class="t nt" x="1055" y="268" text-anchor="middle">Silver</text>
  <text class="t nl" x="1055" y="291" text-anchor="middle">people, work, connections</text>

  <!-- serpentine wrap: silver -> scoring -->
  <path class="flow" d="M1055 332 V375 H555 V414" marker-end="url(#ah)"/>

  <!-- Scoring -->
  <rect class="box" x="430" y="420" width="250" height="130" rx="12"/>
  <text class="t nt" x="555" y="472" text-anchor="middle">Scoring</text>
  <text class="t nl" x="555" y="495" text-anchor="middle">nine weighted categories</text>
  <rect x="452" y="512" width="206" height="20" rx="10" fill="none" stroke="#31405A"/>
  <text class="t pill" x="555" y="525" text-anchor="middle">features &#183; embeddings &#183; Claude</text>

  <path class="flow" d="M686 485 H784" marker-end="url(#ah)"/>

  <!-- Gold cylinder -->
  <path class="cyl" d="M790,436 a125,16 0 0 1 250,0 v98 a125,16 0 0 1 -250,0 z"/>
  <ellipse class="cyltop" cx="915" cy="436" rx="125" ry="16"/>
  <text class="t nt" x="915" y="488" text-anchor="middle">Gold</text>
  <text class="t nl" x="915" y="511" text-anchor="middle">ventures, scores, memos</text>

  <!-- gold -> app -->
  <path class="flow" d="M1046 485 H1276" marker-end="url(#ah)"/>
  <text class="t alab" x="1161" y="475" text-anchor="middle">five read-only views</text>

  <!-- scoring callout -->
  <rect class="note" x="56" y="446" width="220" height="112" rx="10"/>
  <text class="t notet" x="72" y="472">Embeddings judge topic,</text>
  <text class="t notet" x="72" y="490">not rank.</text>
  <text class="t chipl" x="72" y="513">An embedding can&#8217;t know MIT</text>
  <text class="t chipl" x="72" y="529">outranks KTH &#8212; prestige and</text>
  <text class="t chipl" x="72" y="545">scale live in the feature layer.</text>
  <path class="flow" d="M282 502 H424" marker-end="url(#ah)"/>

  <!-- ================= LOVABLE CONTAINER ================= -->
  <rect class="cont" x="1262" y="385" width="282" height="325" rx="14" stroke="#26526B"/>
  <rect x="1278" y="375" width="146" height="20" fill="#0B0E14"/>
  <text class="t hdr" x="1286" y="390" fill="#4A9EDB">LOVABLE CLOUD</text>

  <rect class="box" x="1282" y="420" width="242" height="130" rx="12"/>
  <text class="t nt" x="1403" y="470" text-anchor="middle">CHOSEN</text>
  <text class="t nl" x="1403" y="493" text-anchor="middle">ranked list, memos, sliders</text>
  <rect x="1320" y="510" width="166" height="20" rx="10" fill="none" stroke="#31405A"/>
  <text class="t pill" x="1403" y="523" text-anchor="middle">React &#183; /v1 proxy</text>

  <path class="flow" d="M1403 552 V570" marker-end="url(#ah)"/>

  <rect class="box" x="1282" y="576" width="242" height="110" rx="12"/>
  <text class="t nt" x="1403" y="622" text-anchor="middle">Outreach &#43; interview</text>
  <text class="t nl" x="1403" y="645" text-anchor="middle">consent-based, fills the gaps</text>
  <text class="t nl" x="1403" y="662" text-anchor="middle">we flagged</text>

  <!-- feedback loop -->
  <path class="loop" d="M1403 688 V740 H555 V556" marker-end="url(#ag)"/>
  <text class="t alab" x="940" y="732" text-anchor="middle" fill="#8A7448">interview answers &#8594; re-score</text>

  <!-- footer -->
  <text class="t foot" x="56" y="866">Public sources only &#183; provenance on every fact &#183; erasure enforced in the write path</text>
  <text class="t foot" x="1544" y="866" text-anchor="end">Databricks Free Edition &#183; whole demo under $150</text>
</svg>
